<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Apple Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="admin-body">
    <header>
        <div class="header-content">
            <h1 class="logo">Apple Admin</h1>
            <nav>
                <a href="index.html">Store</a>
                <a href="#" class="active" id="nav-inventory" onclick="showTab('inventory')">Inventory</a>
                <a href="#" id="nav-orders" onclick="showTab('orders')">Orders</a>
            </nav>
        </div>
    </header>

    <main class="admin-container">
        <!-- Dashboard Greeting -->
        <section class="admin-welcome">
            <h2 id="tab-title">Product Inventory</h2>
            <p id="tab-subtitle">Manage your Apple product listings and stock levels.</p>
        </section>

        <!-- Inventory Tab Content -->
        <section id="inventory-tab">
            <div class="admin-header" style="margin-top: 30px;">
                <h3>Active Products</h3>
                <button id="add-product-btn" class="btn-primary">Add New Product</button>
            </div>

        <!-- Low Stock Alert Box -->
        <div id="low-stock-alert" class="alert-box" style="display: none;">
            <strong>Warning:</strong> The following products have low stock (< 5): <span id="low-stock-list"></span>
        </div>

        <table class="inventory-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Stock</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="inventory-list">
                <!-- Products injected here -->
            </tbody>
        </table>
        </section>

        <!-- Orders Tab Content -->
        <section id="orders-tab" style="display: none;">
            <div class="admin-header" style="margin-top: 30px;">
                <h3>Customer Orders</h3>
            </div>
            <table class="inventory-table">
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Customer</th>
                        <th>Total</th>
                        <th>Status</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="orders-list-admin">
                    <!-- Orders injected here -->
                </tbody>
            </table>
        </section>
    </main>

    <!-- Modal for Add/Edit -->
    <div id="product-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h3 id="modal-title">Add Product</h3>
            <form id="product-form">
                <input type="hidden" id="prod-id">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="prod-name" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="prod-category" required>
                        <option value="iPhone">iPhone</option>
                        <option value="MacBook">MacBook</option>
                        <option value="iPad">iPad</option>
                        <option value="Accessories">Accessories</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Price ($)</label>
                    <input type="number" id="prod-price" min="0" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>Stock Quantity</label>
                    <input type="number" id="prod-stock" min="0" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="prod-description"></textarea>
                </div>
                <button type="submit" class="btn-primary">Save Product</button>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>Auth.protectPage(true);</script>
    <script src="js/admin.js"></script>
</body>
</html>
