<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Product Management System</title>
    <!-- Modern Sans-Serif Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <meta name="description" content="Shop the latest Apple products including iPhone, MacBook, iPad, and Accessories.">
</head>
<body>
    <header>
        <div class="header-content">
            <h1 class="logo">Apple Store</h1>
            <nav>
                <a href="index.html" class="active">Store</a>
                <a href="#macbook" id="filter-MacBook">Mac</a>
                <a href="#ipad" id="filter-iPad">iPad</a>
                <a href="#iphone" id="filter-iPhone">iPhone</a>
                <a href="#accessories" id="filter-Accessories">Accessories</a>
                <a href="cart.html">Cart <span id="cart-count">0</span></a>
                <a href="orders.html">Orders</a>
                <a href="admin.html">Admin</a>
            </nav>
        </div>
    </header>

    <main class="store-container">
        <section class="hero">
            <h2>Store. <span>The best way to buy the products you love.</span></h2>
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Search products...">
                <button id="search-btn">Search</button>
            </div>
        </section>

        <section class="products">
            <h3>Latest Products</h3>
            <div class="product-grid" id="product-grid">
                <!-- Products will be injected here via JS -->
            </div>
        </section>
    </main>

    <footer>
        <p>Copyright © 2026 Apple Inc. All rights reserved.</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
