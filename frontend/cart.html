<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Apple Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1 class="logo">Apple Store</h1>
            <nav>
                <a href="index.html">Store</a>
                <a href="cart.html" class="active">Cart</a>
                <a href="orders.html">Orders</a>
                <a href="admin.html">Admin</a>
            </nav>
        </div>
    </header>

    <main class="store-container checkout-page">
        <h2>Review your bag.</h2>
        <div class="checkout-grid" style="display: flex; gap: 40px; margin-top: 40px;">
            <div class="cart-items-container" style="flex: 2;">
                <!-- Cart items list -->
                <div id="cart-items"></div>
                <h3 style="margin-top: 20px; text-align: right;">Total: $<span id="cart-total">0.00</span></h3>
            </div>
            
            <div class="checkout-form" style="flex: 1; padding: 30px; background: #fbfbfd; border-radius: 18px;">
                <h3>Customer Details</h3>
                <form id="checkout-form">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" id="cust-name" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="cust-email" required>
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="tel" id="cust-phone">
                    </div>
                    <div class="form-group">
                        <label>Address</label>
                        <input type="text" id="cust-address">
                    </div>
                    <div class="form-group">
                        <label>Payment Method</label>
                        <select id="cust-payment">
                            <option value="Credit Card">Credit Card</option>
                            <option value="Apple Pay">Apple Pay</option>
                            <option value="PayPal">PayPal</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%; margin-top: 20px;">Place Order</button>
                </form>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
