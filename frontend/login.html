<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Apple Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
            background: linear-gradient(135deg, #f5f5f7 0%, #e8e8ed 100%);
        }

        .login-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            padding: 50px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            width: 100%;
            max-width: 440px;
            text-align: center;
            transform: translateY(0);
            transition: all 0.5s ease;
        }

        .login-card h2 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .login-card p {
            color: #86868b;
            margin-bottom: 30px;
            font-size: 16px;
        }

        /* Role Toggle Switch */
        .role-toggle {
            display: flex;
            background: #e8e8ed;
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .role-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .role-btn.active {
            background: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .login-form {
            text-align: left;
        }

        .form-group label {
            font-size: 12px;
            color: #86868b;
            margin-bottom: 6px;
            display: block;
        }

        .form-group input {
            background: #fbfbfd;
            border: 1px solid #d2d2d7;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 16px;
            width: 100%;
        }

        .form-group input:focus {
            border-color: #0066cc;
            box-shadow: 0 0 0 4px rgba(0,102,204,0.1);
            outline: none;
        }

        .submit-btn {
            width: 100%;
            background: #0066cc;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            margin-top: 10px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .submit-btn:hover {
            background: #005bb5;
        }

        .switch-action {
            margin-top: 25px;
            font-size: 14px;
            color: #0066cc;
            cursor: pointer;
        }

        .error-message {
            color: #ff3b30;
            font-size: 14px;
            margin-bottom: 15px;
            display: none;
        }

        #register-form {
            display: none;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1 class="logo">Apple Store</h1>
            <nav><a href="index.html">Back to Store</a></nav>
        </div>
    </header>

    <main class="login-page">
        <div class="login-card">
            <div id="login-head">
                <h2 id="form-title">Store Login</h2>
                <p id="form-subtitle">Manage your Apple account.</p>
            </div>

            <!-- Admin/Customer Toggle -->
            <div class="role-toggle" id="role-selector">
                <button class="role-btn active" onclick="setRole('customer')">Customer</button>
                <button class="role-btn" onclick="setRole('admin')">Admin</button>
            </div>

            <div id="error-msg" class="error-message"></div>

            <!-- Login Form -->
            <form id="login-form">
                <div class="form-group">
                    <label>Email ID</label>
                    <input type="email" id="login-email" required placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" required placeholder="••••••••">
                </div>
                <button type="submit" class="submit-btn" id="login-btn">Sign In</button>
                <p class="switch-action" id="go-to-reg">New to Apple Store? Create yours now.</p>
            </form>

            <!-- Register Form (Hidden by default) -->
            <form id="register-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="reg-name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email ID</label>
                    <input type="email" id="reg-email" required placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" required placeholder="Minimum 6 characters">
                </div>
                <button type="submit" class="submit-btn">Create Account</button>
                <p class="switch-action" id="go-to-login">Already have an account? Sign In.</p>
            </form>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script>
        let currentRole = 'customer';

        function setRole(role) {
            currentRole = role;
            document.querySelectorAll('.role-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            const title = document.getElementById('form-title');
            const subtitle = document.getElementById('form-subtitle');
            const regLink = document.getElementById('go-to-reg');

            if (role === 'admin') {
                title.textContent = 'Admin Access';
                subtitle.textContent = 'Secure gateway for store management.';
                regLink.style.display = 'none';
            } else {
                title.textContent = 'Store Login';
                subtitle.textContent = 'Manage your Apple account.';
                regLink.style.display = 'block';
            }
            
            // Re-show login form if role changes while in register mode
            showLoginForm();
        }

        function showRegisterForm() {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('register-form').style.display = 'block';
            document.getElementById('role-selector').style.display = 'none';
            document.getElementById('form-title').textContent = 'Create Account';
            document.getElementById('form-subtitle').textContent = 'Join the Apple community.';
        }

        function showLoginForm() {
            document.getElementById('login-form').style.display = 'block';
            document.getElementById('register-form').style.display = 'none';
            document.getElementById('role-selector').style.display = 'flex';
            setRole(currentRole);
        }

        document.getElementById('go-to-reg').onclick = showRegisterForm;
        document.getElementById('go-to-login').onclick = showLoginForm;

        // Handle Login
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorDiv = document.getElementById('error-msg');
            const btn = document.getElementById('login-btn');

            try {
                btn.textContent = 'Signing In...';
                btn.disabled = true;
                const user = await Auth.login(email, password);
                
                // Verify role if admin login is selected
                if (currentRole === 'admin' && user.role !== 'admin') {
                    Auth.logout(); // Clear session
                    throw new Error('Access denied. You do not have admin privileges.');
                }

                // Redirect based on role
                window.location.href = user.role === 'admin' ? 'admin.html' : 'index.html';
            } catch (err) {
                errorDiv.textContent = err.message;
                errorDiv.style.display = 'block';
                btn.textContent = 'Sign In';
                btn.disabled = false;
            }
        };

        // Handle Register
        document.getElementById('register-form').onsubmit = async (e) => {
            e.preventDefault();
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const errorDiv = document.getElementById('error-msg');

            try {
                await Auth.register(name, email, password);
                window.location.href = 'index.html';
            } catch (err) {
                errorDiv.textContent = err.message;
                errorDiv.style.display = 'block';
            }
        };
    </script>
</body>
</html>
